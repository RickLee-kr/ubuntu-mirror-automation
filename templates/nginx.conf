# Managed by ubuntu-mirror-server — offline upgrade mirror
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Do not expose the entire filesystem — only mirror + offline trees
    root /var/spool/apt-mirror/mirror;
    autoindex on;

    location / {
        try_files $uri $uri/ =404;
    }

    # Trailing-slash-safe alias for Ubuntu archive tree
    location = /ubuntu {
        return 301 /ubuntu/;
    }
    location /ubuntu/ {
        alias /var/spool/apt-mirror/mirror/archive.ubuntu.com/ubuntu/;
        autoindex on;
    }

    # Offline upgrade metadata (meta-release-lts, manifests, READY/FROZEN)
    location = /offline {
        return 301 /offline/;
    }
    location /offline/ {
        alias /var/spool/apt-mirror/offline/;
        autoindex on;
        default_type text/plain;
        types {
            application/json json;
            text/plain txt;
            text/plain READY FROZEN;
        }
    }

    # Block obvious path traversal probes (alias already confines paths)
    location ~ /\.\. {
        return 403;
    }

    access_log /var/log/nginx/apt-mirror-access.log;
    error_log /var/log/nginx/apt-mirror-error.log;
}

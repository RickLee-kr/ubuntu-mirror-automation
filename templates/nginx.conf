# Managed by ubuntu-mirror-server — selective offline upgrade mirror
#
# Canonical document root (must match publish-selective atomic symlink):
#   /var/spool/apt-mirror/selective/current → published
#
# Path-based serving (no external DNS required):
#   /ubuntu/          → selective published hop tree (after publish-selective)
#   /ubuntu-security/ → same selective tree (no duplicate pool storage)
#   /offline/         → selective shared offline (meta-release / READY) with legacy fallback
#   /hops/<hop>/ubuntu/ → hop-separated deterministic snapshots
#
# IMPORTANT: Until publish-selective succeeds, do NOT point production nginx at staging.
# Serve only selective/published (via current symlink). Staging stays private.
# install.sh / migrate-nginx-selective deploy this template via um_generate_nginx_conf.
# Legacy root /var/spool/apt-mirror/mirror is NOT valid for selective publish.
#
# Optional Host compatibility (same listen port; enable via /etc/hosts if desired):
#   Host: archive.ubuntu.com / security.ubuntu.com / old-releases.ubuntu.com

# Default path-based vhost (clients use http://MIRROR_IP/ubuntu and /ubuntu-security)
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    # Atomic publish pointer: current -> published (staging never exposed)
    root /var/spool/apt-mirror/selective/current;
    autoindex on;

    location / {
        try_files $uri $uri/ =404;
    }

    # Hop-separated snapshots
    location /hops/ {
        alias /var/spool/apt-mirror/selective/current/hops/;
        autoindex on;
    }

    # Trailing-slash-safe alias — rewrite to hop path via client sources,
    # or serve a default hop symlink at published/ubuntu when present.
    location = /ubuntu {
        return 301 /ubuntu/;
    }
    location /ubuntu/ {
        alias /var/spool/apt-mirror/selective/current/ubuntu/;
        autoindex on;
    }

    # Security pocket compatibility prefix (same selective tree; no file duplication)
    location = /ubuntu-security {
        return 301 /ubuntu-security/;
    }
    location /ubuntu-security/ {
        alias /var/spool/apt-mirror/selective/current/ubuntu/;
        autoindex on;
    }

    # Offline upgrade metadata (meta-release-lts, READY) from selective shared/
    location = /offline {
        return 301 /offline/;
    }
    location /offline/ {
        alias /var/spool/apt-mirror/selective/current/shared/offline/;
        autoindex off;
        default_type text/plain;
        types {
            application/json json;
            text/plain txt;
            text/plain READY FROZEN;
        }
    }

    # Local selective signing key (public)
    location = /keys/ubuntu-mirror-selective.gpg {
        alias /var/spool/apt-mirror/selective/keys/ubuntu-mirror-selective.gpg;
        default_type application/pgp-keys;
    }

    # Client upgrade artifacts (separate from selective published repository).
    # Populated by: ubuntu-offline-mirror.sh build-client-xenial-to-bionic
    # Must NOT live under selective/current — READY fingerprint stays unchanged.
    location = /client {
        return 301 /client/;
    }
    location /client/ {
        alias /var/spool/apt-mirror/client/;
        autoindex on;
        default_type text/plain;
        types {
            application/json json;
            application/x-sh sh;
            application/pgp-keys gpg;
            text/plain txt asc;
        }
    }

    # Block obvious path traversal probes (alias already confines paths)
    location ~ /\.\. {
        return 403;
    }

    access_log /var/log/nginx/apt-mirror-access.log;
    error_log /var/log/nginx/apt-mirror-error.log;
}

# Optional Host: archive.ubuntu.com (for /etc/hosts override; not required)
server {
    listen 80;
    listen [::]:80;
    server_name archive.ubuntu.com;

    root /var/spool/apt-mirror/selective/current;
    autoindex on;

    location = /ubuntu {
        return 301 /ubuntu/;
    }
    location /ubuntu/ {
        alias /var/spool/apt-mirror/selective/current/ubuntu/;
        autoindex on;
    }
    location /hops/ {
        alias /var/spool/apt-mirror/selective/current/hops/;
        autoindex on;
    }
    location ~ /\.\. {
        return 403;
    }

    access_log /var/log/nginx/apt-mirror-access.log;
    error_log /var/log/nginx/apt-mirror-error.log;
}


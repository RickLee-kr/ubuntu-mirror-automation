# DP OS Upgrade Phase 1 preflight policy (KEY=VALUE only; no shell commands)
# Conservative project defaults — not vendor-published minimums.

MIN_SUPPORTED_DP_VERSION=6.2.0
TARGET_DP_VERSION=6.5.0
TARGET_OS_VERSION=24.04

# ~12 GiB / ~512 MiB / ~5 GiB
MIN_ROOT_AVAILABLE_BYTES=12884901888
MIN_BOOT_AVAILABLE_BYTES=536870912
MIN_AELLADATA_AVAILABLE_BYTES=5368709120
MIN_INODE_AVAILABLE_PERCENT=10

REQUIRE_AELLA_BASH=true
REQUIRE_ROOT_BASH=true

# Execution profiles
DEFAULT_EXECUTION_PROFILE=production
PRODUCTION_REQUIRE_SNAPSHOT_OR_BACKUP=true
DISCOVERY_REQUIRE_SNAPSHOT_OR_BACKUP=false
DISCOVERY_REQUIRE_DISPOSABLE_VM_ACK=true
DISCOVERY_DEFAULT_MAX_HOPS=1
DISCOVERY_REQUIRE_NEW_PREFLIGHT_AFTER_HOP=true
DISCOVERY_CAPTURE_PACKAGES=true
DISCOVERY_CAPTURE_FILE_CHANGES=true
DISCOVERY_CAPTURE_PYTHON_INVENTORY=true
DISCOVERY_PRESERVE_APT_CACHE=true

# Phase 2 artifacts must never block Phase 1 OS readiness
PHASE2_CHECKS_AFFECT_OS_PREFLIGHT=false

# Legacy key retained for compatibility; Phase 1 treats missing Phase 2
# evidence as info/warning only (never BLOCKER).
# warning | blocker | info
MISSING_PHASE2_BUNDLE_WHEN_PHASE2_NOT_REQUIRED=info

# warning | blocker | info
THIRD_PARTY_REPOSITORIES=warning
AELLADATA_NOT_SEPARATE_MOUNT=warning

# blocker | warning | unknown
UNKNOWN_NTP_STATUS=blocker

# When mirror/cache evidence for package-source-url is absent and --live-check is off:
# blocker | unknown
MISSING_PACKAGE_SOURCE_EVIDENCE=blocker

# Critical held packages without project unhold/restore logic
CRITICAL_HELD_PACKAGES=systemd,udev,apt,dpkg,linux-generic,ubuntu-minimal,ubuntu-standard,ubuntu-release-upgrader-core,update-manager-core

# Supported collector versions (comma-separated; major.minor.patch prefix match)
SUPPORTED_COLLECTOR_SCRIPT_VERSIONS=1.0.1,1.0.2
SUPPORTED_COLLECTOR_SCHEMA_VERSIONS=1.0

# Placeholders rejected for snapshot/backup references (comma-separated, lowercase)
REJECTED_REFERENCE_PLACEHOLDERS=none,n/a,na,unknown,todo,test,later,null,undefined,placeholder,tbd,pending

# Official Ubuntu upgrade hold handling present in this repository?
# false: critical holds are blockers (current state — no unhold/restore scripts exist)
PROJECT_MANAGES_CRITICAL_HOLDS=false

# Compatibility alias used by older readers
REQUIRE_SNAPSHOT_OR_BACKUP=true

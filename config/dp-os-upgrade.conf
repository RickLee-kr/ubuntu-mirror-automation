# DP OS Upgrade Phase 1 policy (KEY=VALUE only; never shell-sourced)
# Conservative project defaults for Stellar Cyber DP Ubuntu LTS hops.

TARGET_OS_VERSION=24.04
TARGET_OS_CODENAME=noble

PREFLIGHT_MAX_AGE_SECONDS=3600

MIN_ROOT_AVAILABLE_BYTES=12884901888
MIN_BOOT_AVAILABLE_BYTES=536870912
MIN_AELLADATA_AVAILABLE_BYTES=5368709120
MIN_INODE_AVAILABLE_PERCENT=10

AUTO_RETRY_ENABLED=true
AUTO_RETRY_INTERVAL_SECONDS=900
MAX_RETRY_ATTEMPTS=20

MANAGE_CRITICAL_HOLDS=false
RESTORE_ORIGINAL_HOLDS_AT_COMPLETION=false
CRITICAL_HELD_PACKAGES=systemd,udev,apt,dpkg,linux-generic,ubuntu-minimal,ubuntu-standard,ubuntu-release-upgrader-core,update-manager-core
CRITICAL_HOLD_ALLOWLIST=

DISABLE_THIRD_PARTY_REPOSITORIES=true
REENABLE_THIRD_PARTY_REPOSITORIES=false

REQUIRE_INTERNAL_RELEASE_METADATA_FOR_MIRROR=true
ALLOW_EXTERNAL_FALLBACK_IN_MIRROR_MODE=false

REQUIRE_AELLA_BASH=true
REQUIRE_ROOT_BASH=true

STATE_DIR=/opt/aelladata/os-upgrade
LOCK_FILE=/run/lock/dp-os-upgrade.lock
LOG_FILE=/var/log/aella/auto_os_upgrade.log

DESTRUCTIVE_ACK_PHRASE=I_UNDERSTAND_THIS_OS_UPGRADE_IS_DESTRUCTIVE
ALL_WARNINGS_ACK_PHRASE=I_ACCEPT_ALL_PREFLIGHT_WARNINGS
DISCOVERY_DISPOSABLE_VM_ACK_PHRASE=I_UNDERSTAND_THIS_DISCOVERY_VM_MAY_BE_LOST
ORPHAN_ARCHIVE_ACK_PHRASE=I_UNDERSTAND_THE_ORPHANED_STATE_WILL_BE_ARCHIVED

DEFAULT_EXECUTION_PROFILE=production
PRODUCTION_REQUIRE_SNAPSHOT_OR_BACKUP=true
DISCOVERY_REQUIRE_SNAPSHOT_OR_BACKUP=false
DISCOVERY_REQUIRE_DISPOSABLE_VM_ACK=true
DISCOVERY_DEFAULT_MAX_HOPS=1
DISCOVERY_REQUIRE_NEW_PREFLIGHT_AFTER_HOP=true
DISCOVERY_CAPTURE_PACKAGES=true
DISCOVERY_CAPTURE_FILE_CHANGES=true
DISCOVERY_CAPTURE_PYTHON_INVENTORY=true
DISCOVERY_PRESERVE_APT_CACHE=true
PHASE2_CHECKS_AFFECT_OS_PREFLIGHT=false

REJECTED_REFERENCE_PLACEHOLDERS=none,n/a,na,unknown,todo,test,later,null,undefined,placeholder,tbd,pending

# Mirror layout (SSOT from templates/nginx.conf + ubuntu-offline-mirror)
MIRROR_UBUNTU_PATH=/ubuntu
MIRROR_OFFLINE_PATH=/offline
MIRROR_META_RELEASE_PATH=/offline/meta-release-lts

# Archive safety limits
MAX_PREFLIGHT_ARCHIVE_ENTRIES=5000
MAX_PREFLIGHT_ARCHIVE_BYTES=104857600

# Command timeouts (seconds)
DEFAULT_COMMAND_TIMEOUT_SECONDS=3600
DO_RELEASE_UPGRADE_TIMEOUT_SECONDS=14400
APT_UPDATE_TIMEOUT_SECONDS=1800

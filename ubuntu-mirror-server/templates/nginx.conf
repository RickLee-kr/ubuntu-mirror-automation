# Managed by ubuntu-mirror-server — generated from mirror.conf
server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /var/spool/apt-mirror/mirror;
    autoindex on;

    location / {
        try_files $uri $uri/ =404;
    }

    location /ubuntu {
        alias /var/spool/apt-mirror/mirror/archive.ubuntu.com/ubuntu;
        autoindex on;
    }

    access_log /var/log/nginx/apt-mirror-access.log;
    error_log /var/log/nginx/apt-mirror-error.log;
}

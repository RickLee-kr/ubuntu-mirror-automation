# Ubuntu Mirror Server configuration
# All install/validate/ops scripts read this file.
# Override path with: --config /path/to/mirror.conf

# --- Identity / network ---
MIRROR_HOSTNAME="_"
MIRROR_PORT="80"
# Public URL clients use (auto-detected if empty). Example production: http://221.139.249.111
MIRROR_URL=""
# Bind address shown in client helpers (auto-detected if empty). Example: 221.139.249.111
MIRROR_IP=""

# --- Storage ---
# Base path for apt-mirror (PDF: /var/spool/apt-mirror)
BASE_PATH="/var/spool/apt-mirror"
# Optional block device for data disk (e.g. /dev/sdb1). Empty = do not mount/format.
DATA_DEVICE=""
# Filesystem type used only with --format-device
DATA_FSTYPE="ext4"
# Mount options written to fstab when mounting DATA_DEVICE
DATA_MOUNT_OPTS="defaults,noatime"
# Minimum free space warning threshold (percent used)
DISK_WARN_PERCENT="80"
DISK_CRIT_PERCENT="90"
# Minimum recommended free GiB before starting default (full offline) sync
MIN_FREE_GIB="50"
MIN_FREE_GB="50"
# Keep at least this percent of the filesystem free (blocks sync if violated)
DISK_RESERVE_PERCENT="10"
# Projected apt-mirror download footprint used for pre-sync capacity checks
PROJECTED_SIZE_GIB_MINIMAL="320"
PROJECTED_SIZE_GIB_FULL="900"

# --- Upstream mirror ---
UPSTREAM_MIRROR="http://archive.ubuntu.com/ubuntu"
DEFAULT_ARCH="amd64"
NTHREADS="20"
# Offline upgrade mirror: full components (main restricted universe multiverse)
# Use sudo ./install.sh --minimal only for a reduced footprint (not sufficient for closed-network release upgrades).
MIRROR_MODE="full"
# Space-separated Ubuntu codenames (LTS upgrade chain)
UBUNTU_VERSIONS="xenial bionic focal jammy noble"
# Suites mirrored per release: release + updates + security + backports
SUITE_SUFFIXES="updates security backports"
# Include source packages (deb-src). Must stay false for this offline mirror.
INCLUDE_SOURCE="false"
# Public URL rewritten into local meta-release-lts (override in /etc/default/ubuntu-offline-mirror)
PUBLIC_BASE_URL="http://ubuntu-mirror.local"
# Refuse OS-root spool unless explicitly overridden
ALLOW_ROOT_FS_MIRROR="false"
RUN_CLEAN="true"
SYNC_RANDOMIZED_DELAY_SEC="900"

# --- nginx ---
NGINX_SITE_NAME="apt-mirror"
NGINX_LISTEN_IPV6="true"
NGINX_DEFAULT_SERVER="true"
# Disable stock default site when enabling apt-mirror
NGINX_DISABLE_DEFAULT="true"

# --- systemd timer ---
# Daily sync at 02:00 (PDF)
SYNC_ON_CALENDAR="*-*-* 02:00:00"
SYNC_PERSISTENT="true"

# --- Logging ---
LOG_DIR="/var/log/ubuntu-mirror"
APT_MIRROR_LOG="/var/log/apt-mirror.log"
APT_MIRROR_INITIAL_LOG="/var/log/apt-mirror-initial.log"
NGINX_ACCESS_LOG="/var/log/nginx/apt-mirror-access.log"
NGINX_ERROR_LOG="/var/log/nginx/apt-mirror-error.log"

# --- Install paths ---
INSTALL_BIN_DIR="/usr/local/bin"
INSTALL_LIB_DIR="/usr/local/lib/ubuntu-mirror"
INSTALL_CONF_DIR="/etc/ubuntu-mirror"
BACKUP_DIR="/var/backups/ubuntu-mirror"

# --- Health thresholds ---
HTTP_TIMEOUT_SEC="10"
HEALTH_HTTP_LATENCY_WARN_MS="500"
HEALTH_LOG_ERROR_WARN="20"
# Sync dashboard: stall if no log/disk/network activity for this many seconds
STALL_THRESHOLD_SEC="600"
# Below stall threshold, quiet periods are reported as WAITING
WAITING_THRESHOLD_SEC="30"

# --- Safety ---
# Never format or wipe without explicit CLI flags
ALLOW_FORMAT="false"
ALLOW_DELETE_MIRROR_DATA="false"
